<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weekly Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:       #fdf6e4;
      --parchment:#6b1a2a;
      --card:     #5c1520;
      --border:   #3e0e15;
      --border-lt:#8a2d3e;
      --maroon:   #6b1a2a;
      --maroon2:  #8c2535;
      --maroon-lt:#b05060;
      --text:     #3a2215;
      --text-md:  #6b4530;
      --muted:    #c4a882;
      --sage:     #607060;
      --serif:    'Cormorant Garamond', Georgia, serif;
      --sans:     'Jost', sans-serif;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: #3a2215;
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
      padding: 3rem 2.5rem 2.5rem;
      background-image:
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4b882' fill-opacity='0.12'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"),
        radial-gradient(ellipse at 15% 5%, rgba(107,26,42,0.04) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 95%, rgba(107,26,42,0.03) 0%, transparent 55%);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0;
      width: 80px; height: 1px;
      background: var(--maroon);
    }

    .header-left { display: flex; flex-direction: column; gap: 0.3rem; }

    .eyebrow {
      font-family: var(--sans);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--maroon-lt);
    }

    header h1 {
      font-family: var(--serif);
      font-size: 3.4rem;
      font-weight: 300;
      color: var(--maroon);
      letter-spacing: -0.5px;
      line-height: 0.95;
    }

    header h1 em { font-style: italic; font-weight: 300; color: var(--maroon2); }

    .week-nav { display: flex; flex-direction: column; align-items: flex-end; gap: 0.6rem; }

    #week-label {
      font-family: var(--serif);
      font-size: 1rem;
      font-style: italic;
      color: var(--text-md);
      letter-spacing: 0.02em;
    }

    .nav-btns { display: flex; gap: 0.5rem; align-items: center; }

    .nav-btns button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--maroon);
      font-family: var(--serif);
      font-size: 1.1rem;
      width: 34px; height: 34px;
      cursor: pointer;
      border-radius: 50%;
      transition: all 0.25s ease;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-btns button:hover {
      background: var(--maroon);
      color: var(--bg);
      border-color: var(--maroon);
      transform: scale(1.05);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1rem;
    }

    .day-col {
      background: var(--parchment);
      border: 1px solid var(--border-lt);
      border-radius: 2px;
      display: flex;
      flex-direction: column;
      min-height: 520px;
      transition: box-shadow 0.3s ease, border-color 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .day-col::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: transparent;
      transition: background 0.3s;
    }

    .day-col:hover { box-shadow: 0 8px 30px rgba(107,26,42,0.25); border-color: #3e0e15; }
    .day-col.today::before { background: #f9e8c0; }
    .day-col.today { border-color: #f5e8d0; }

    .day-header {
      padding: 1.1rem 1rem 0.9rem;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      position: relative;
    }

    .day-name {
      font-family: var(--sans);
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(253,246,228,0.55);
      margin-bottom: 0.25rem;
    }

    .today .day-name { color: rgba(253,246,228,0.75); }

    .day-date {
      font-family: var(--serif);
      font-size: 2rem;
      font-weight: 300;
      line-height: 1;
      color: #fdf6e4;
    }

    .today .day-date { color: #f9e8c0; font-style: italic; }

    .today-pip {
      position: absolute;
      right: 1rem; top: 1.1rem;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #f9e8c0;
      animation: pip-pulse 2.5s ease-in-out infinite;
    }

    @keyframes pip-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.6); }
    }

    .tasks {
      flex: 1;
      padding: 0.75rem 0.75rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      overflow-y: auto;
    }

    .tasks::-webkit-scrollbar { width: 3px; }
    .tasks::-webkit-scrollbar-track { background: transparent; }
    .tasks::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

    .task {
      background: #fdf6e4;
      border: 1px solid rgba(255,255,255,0.18);
      border-left: 2px solid #9a3045;
      padding: 0.5rem 0.55rem;
      border-radius: 1px;
      font-size: 0.73rem;
      line-height: 1.45;
      display: flex;
      align-items: flex-start;
      gap: 0.45rem;
      transition: all 0.2s ease;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.18); }
    .task.done { border-left-color: var(--sage); opacity: 0.55; }
    .task.done .task-text { text-decoration: line-through; color: #a08060; }

    .task-check {
      margin-top: 2px;
      flex-shrink: 0;
      width: 13px; height: 13px;
      border: 1px solid #c4a882;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px;
      color: transparent;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .task-check:hover { border-color: var(--maroon); }
    .task.done .task-check { background: var(--sage); border-color: var(--sage); color: white; }

    .pri-line { width: 2px; align-self: stretch; flex-shrink: 0; border-radius: 2px; min-height: 14px; }

    .task-text { flex: 1; color: #3a2215; font-weight: 300; }

    .task-del {
      flex-shrink: 0;
      color: transparent;
      font-size: 0.65rem;
      cursor: pointer;
      line-height: 1;
      margin-top: 2px;
      transition: color 0.2s;
    }
    .task:hover .task-del { color: #a08060; }
    .task-del:hover { color: #7a1f30 !important; }

    .add-area {
      padding: 0.65rem 0.75rem 0.75rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      background: var(--card);
    }

    .add-row { display: flex; gap: 0.4rem; align-items: center; }

    .add-row input {
      flex: 1;
      background: #fdf6e4;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 1px;
      color: #3a2215;
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 300;
      padding: 0.4rem 0.55rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-row input:focus { border-color: rgba(255,255,255,0.5); }
    .add-row input::placeholder { color: #a08060; font-style: italic; }

    .add-btn {
      background: var(--maroon);
      border: none;
      color: var(--bg);
      font-family: var(--serif);
      font-size: 1.2rem;
      width: 28px; height: 28px;
      cursor: pointer;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
      padding-bottom: 1px;
    }
    .add-btn:hover { background: var(--maroon2); transform: scale(1.1); }

    .priority-row { display: flex; gap: 3px; margin-top: 0.45rem; }

    .pri-btn {
      flex: 1;
      font-family: var(--sans);
      font-size: 0.52rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 0;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: rgba(253,246,228,0.55);
      border-radius: 1px;
      cursor: pointer;
      transition: all 0.18s ease;
    }
    .pri-btn:hover { color: #fdf6e4; border-color: rgba(255,255,255,0.45); }
    .pri-btn.active.high { background: var(--maroon2); border-color: var(--maroon2); color: var(--bg); }
    .pri-btn.active.med  { background: var(--maroon);  border-color: var(--maroon);  color: var(--bg); }
    .pri-btn.active.low  { background: var(--sage);    border-color: var(--sage);    color: var(--bg); }

    .stats-bar {
      margin-top: 2.5rem;
      display: flex;
      align-items: center;
      gap: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e0c9a4;
      flex-wrap: wrap;
    }

    .stat { display: flex; flex-direction: column; gap: 0.15rem; }

    .stat-label {
      font-family: var(--sans);
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stat-value {
      font-family: var(--serif);
      font-size: 1.6rem;
      font-weight: 300;
      color: var(--maroon);
      line-height: 1;
    }

    .progress-wrap { flex: 1; min-width: 120px; display: flex; flex-direction: column; gap: 0.4rem; }

    .progress-label {
      font-family: var(--sans);
      font-size: 0.58rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    .progress-bar { height: 3px; background: var(--card); border-radius: 2px; overflow: hidden; }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--maroon2), var(--maroon-lt));
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    @media (max-width: 1100px) { .grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 800px)  { .grid { grid-template-columns: repeat(3, 1fr); } body { padding: 2rem 1.5rem; } }
    @media (max-width: 560px)  {
      .grid { grid-template-columns: 1fr 1fr; }
      header { flex-direction: column; align-items: flex-start; gap: 1.5rem; }
      header h1 { font-size: 2.4rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="eyebrow">Your personal agenda</span>
    <h1>Weekly <em>Planner</em></h1>
  </div>
  <div class="week-nav">
    <div id="week-label"></div>
    <div class="nav-btns">
      <button id="prevWeek">&#8592;</button>
      <button id="nextWeek">&#8594;</button>
    </div>
  </div>
</header>

<div class="grid" id="planner-grid"></div>
<div class="stats-bar" id="stats-bar"></div>

<script>
  const DAYSSH = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const PRI_CLR = { high: '#8c2535', med: '#6b1a2a', low: '#607060' };

  let weekOffset = 0;
  let tasks = JSON.parse(localStorage.getItem('wp_tasks_v2') || '{}');
  let selPri = {};

  const getWeekStart = offset => {
    const now = new Date(), s = new Date(now);
    s.setDate(now.getDate() - now.getDay() + offset * 7);
    s.setHours(0,0,0,0); return s;
  };

  const dateKey = d => d.toISOString().split('T')[0];
  const save = () => localStorage.setItem('wp_tasks_v2', JSON.stringify(tasks));
  const esc  = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  function addTask(key, text, pri) {
    if (!text.trim()) return;
    if (!tasks[key]) tasks[key] = [];
    tasks[key].push({ id: Date.now(), text: text.trim(), done: false, priority: pri||'med' });
    save(); render();
  }

  function toggleTask(key, id) {
    const t = tasks[key]?.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(key, id) {
    if (!tasks[key]) return;
    tasks[key] = tasks[key].filter(t => t.id !== id);
    save(); render();
  }

  function render() {
    const grid = document.getElementById('planner-grid');
    grid.innerHTML = '';
    const ws = getWeekStart(weekOffset);
    const today = new Date(); today.setHours(0,0,0,0);
    const we = new Date(ws); we.setDate(ws.getDate() + 6);
    document.getElementById('week-label').textContent =
      `${MONTHS[ws.getMonth()]} ${ws.getDate()} – ${we.getDate()}, ${we.getFullYear()}`;

    let total = 0, done = 0;

    for (let i = 0; i < 7; i++) {
      const d = new Date(ws); d.setDate(ws.getDate() + i);
      const key = dateKey(d);
      const isToday = d.getTime() === today.getTime();
      const dt = tasks[key] || [];
      total += dt.length;
      done  += dt.filter(t => t.done).length;

      const pri = selPri[key] || 'med';
      const col = document.createElement('div');
      col.className = 'day-col' + (isToday ? ' today' : '');
      col.innerHTML = `
        <div class="day-header">
          <div class="day-name">${DAYSSH[d.getDay()]}</div>
          <div class="day-date">${d.getDate()}</div>
          ${isToday ? '<div class="today-pip"></div>' : ''}
        </div>
        <div class="tasks" id="tasks-${key}"></div>
        <div class="add-area">
          <div class="add-row">
            <input type="text" id="inp-${key}" placeholder="Add a task…" maxlength="80"/>
            <button class="add-btn" onclick="handleAdd('${key}')">+</button>
          </div>
          <div class="priority-row">
            <button class="pri-btn high ${pri==='high'?'active':''}" onclick="setPri('${key}','high')">High</button>
            <button class="pri-btn med ${pri==='med'?'active':''}" onclick="setPri('${key}','med')">Med</button>
            <button class="pri-btn low ${pri==='low'?'active':''}" onclick="setPri('${key}','low')">Low</button>
          </div>
        </div>`;
      grid.appendChild(col);

      const tc = col.querySelector(`#tasks-${key}`);
      dt.forEach(task => {
        const el = document.createElement('div');
        el.className = 'task' + (task.done ? ' done' : '');
        el.innerHTML = `
          <div class="task-check" onclick="toggleTask('${key}',${task.id})">${task.done ? '✓' : ''}</div>
          <div class="pri-line" style="background:${PRI_CLR[task.priority]||PRI_CLR.med}"></div>
          <span class="task-text">${esc(task.text)}</span>
          <span class="task-del" onclick="deleteTask('${key}',${task.id})">✕</span>`;
        tc.appendChild(el);
      });

      col.querySelector(`#inp-${key}`).addEventListener('keydown', e => {
        if (e.key === 'Enter') handleAdd(key);
      });
    }

    const pct = total ? Math.round(done / total * 100) : 0;
    document.getElementById('stats-bar').innerHTML = `
      <div class="stat"><div class="stat-label">Total tasks</div><div class="stat-value">${total}</div></div>
      <div class="stat"><div class="stat-label">Completed</div><div class="stat-value">${done}</div></div>
      <div class="stat"><div class="stat-label">Remaining</div><div class="stat-value">${total - done}</div></div>
      <div class="progress-wrap">
        <div class="progress-label"><span>Weekly progress</span><span>${pct}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>`;
  }

  function setPri(key, p) {
    selPri[key] = p; render();
    setTimeout(() => document.getElementById(`inp-${key}`)?.focus(), 0);
  }

  function handleAdd(key) {
    const inp = document.getElementById(`inp-${key}`);
    if (!inp) return;
    addTask(key, inp.value, selPri[key] || 'med');
    setTimeout(() => document.getElementById(`inp-${key}`)?.focus(), 0);
  }

  document.getElementById('prevWeek').onclick = () => { weekOffset--; render(); };
  document.getElementById('nextWeek').onclick = () => { weekOffset++; render(); };

  render();
</script>
</body>
</html>
